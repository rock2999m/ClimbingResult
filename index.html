<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.png" />
    <title>Climbing Session Recorder</title>
    <style>
      :root {
        --bg: #f1f5f9;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #cbd5e1;
        --line-soft: #e2e8f0;
        --accent: #0f172a;
        --accent-text: #ffffff;
        --sub: #e2e8f0;
        --danger-bg: #fee2e2;
        --danger-text: #991b1b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      }

      body {
        min-width: 320px;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        max-width: 920px;
        margin: 0 auto;
        padding: 16px;
      }

      .screen {
        display: none;
      }

      .screen.active {
        display: block;
      }

      .card {
        background: var(--card);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .card-title {
        margin: 0;
        font-size: 22px;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .stack-sm {
        display: grid;
        gap: 8px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .grid-edit {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 16px;
      }

      .label {
        font-weight: 600;
      }

      .muted {
        color: var(--muted);
      }

      .small {
        font-size: 12px;
      }

      .button {
        min-height: 48px;
        padding: 12px 16px;
        border-radius: 16px;
        border: none;
        background: var(--accent);
        color: var(--accent-text);
        font-weight: 700;
        cursor: pointer;
      }

      .button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .button.secondary {
        background: var(--sub);
        color: var(--text);
      }

      .button.ghost {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--line);
      }

      .button.danger {
        background: var(--danger-bg);
        color: var(--danger-text);
        border: 1px solid var(--line);
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .input,
      .select {
        min-height: 48px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #ffffff;
        padding: 0 12px;
        width: 100%;
      }

      .count-box {
        min-height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #ffffff;
        font-size: 28px;
        font-weight: 700;
      }

      .try-button {
        width: 100%;
        min-height: 80px;
        font-size: 24px;
      }

      .result-list {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #ffffff;
        padding: 12px;
        display: grid;
        gap: 8px;
      }

      .result-item {
        border: 1px solid var(--line-soft);
        border-radius: 14px;
        background: #f8fafc;
        padding: 12px;
      }

      .result-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        font-size: 14px;
      }

      .result-no {
        font-size: 18px;
        font-weight: 800;
        font-variant-numeric: tabular-nums;
      }

      .result-main {
        font-weight: 700;
      }

      .edit-list {
        display: grid;
        gap: 12px;
      }

      .edit-item {
        border: 1px solid var(--line-soft);
        border-radius: 16px;
        background: #ffffff;
        padding: 12px;
      }

      .edit-item-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .icon-buttons {
        display: flex;
        gap: 8px;
      }

      .icon-button {
        min-width: 44px;
        min-height: 44px;
        padding: 0;
      }

      .text-block {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #ffffff;
        padding: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
      }

      .dialog-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .dialog-backdrop.open {
        display: flex;
      }

      .dialog {
        width: 100%;
        max-width: 420px;
        background: #ffffff;
        border-radius: 20px;
        padding: 20px;
      }

      .dialog-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 16px;
      }

      .plus-button {
        min-width: 72px;
        min-height: 48px;
        padding: 0;
        border-radius: 16px;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .menu-button-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 8px;
      }

      .menu-item {
        border: 1px solid var(--line-soft);
        border-radius: 14px;
        background: #ffffff;
        padding: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }

      .menu-item-info {
        flex: 1;
        overflow: hidden;
      }

      .menu-item-grade {
        font-weight: 700;
      }

      .menu-item-controls {
        display: flex;
        gap: 4px;
      }

      .small-button {
        min-width: 32px;
        min-height: 32px;
        padding: 0;
        border-radius: 8px;
        font-size: 12px;
      }

      @media (max-width: 760px) {
        .grid-2,
        .grid-edit {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <section id="screen-home" class="screen active">
        <div class="card">
          <div class="card-header">
            <h1 class="card-title">クライミング Session Recorder</h1>
            <button id="home-menu-add" class="button secondary plus-button" type="button">+</button>
          </div>
          <div class="stack">
            <div class="stack-sm">
              <div class="label">Sessionタイプ</div>
              <div class="grid-2">
                <button id="home-type-volume" class="button secondary" type="button">容量</button>
                <button id="home-type-max" class="button secondary" type="button">最大</button>
              </div>
            </div>
            <div id="home-menus" class="menu-button-grid"></div>
            <div class="grid-2">
              <button id="home-start" class="button" type="button" disabled>Session開始</button>
              <button id="home-previous" class="button secondary" type="button">前回のResultを表示</button>
            </div>
          </div>
        </div>
      </section>

      <section id="screen-menu-manager" class="screen">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">トレーニングメニュー管理</h2>
          </div>
          <div class="stack">
            <div id="menu-manager-list" class="edit-list"></div>
            <div class="grid-2">
              <button id="menu-manager-create" class="button" type="button">新規作成</button>
              <button id="menu-manager-close" class="button secondary" type="button">戻る</button>
            </div>
          </div>
        </div>
      </section>

      <section id="screen-menu-setup" class="screen">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">トレーニングメニュー設定</h2>
          </div>
          <div class="stack">
            <label class="field">
              <span class="label">メニュー名</span>
              <input id="menu-setup-name" class="input" type="text" maxlength="20" placeholder="例: 3級サーキット" />
            </label>

            <div class="field">
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="label">課題一覧</span>
                <button id="menu-setup-add-problem" class="button ghost icon-button" type="button" style="min-width: auto; padding: 4px 8px; font-size: 14px;">+ 追加</button>
              </div>
              <div id="menu-setup-problems" class="edit-list"></div>
            </div>

            <div class="grid-2">
              <button id="menu-setup-save" class="button" type="button">保存</button>
              <button id="menu-setup-cancel" class="button secondary" type="button">キャンセル</button>
            </div>
          </div>
        </div>
      </section>

      <section id="screen-session" class="screen">
        <div class="card">
          <div class="card-header">
            <div>
              <h2 class="card-title">Session記録</h2>
              <div id="session-count" class="muted" style="font-size: 14px; margin-top: 4px;">記録済み 0件</div>
            </div>
            <button id="session-edit-open" class="button ghost" type="button">編集</button>
          </div>
          <div class="stack" style="gap: 20px;">
            <div class="stack-sm">
              <label class="field">
                <span class="label">グレード</span>
                <select id="session-grade" class="select"></select>
              </label>
              <label class="field">
                <span class="label">壁の傾斜</span>
                <select id="session-wall-angle" class="select"></select>
              </label>
              <label class="field">
                <span class="label">課題タイプ</span>
                <select id="session-problem-type" class="select"></select>
              </label>
            </div>

            <div class="field">
              <div class="label">トライ回数</div>
              <div id="session-try-count" class="count-box">1</div>
              <button id="session-try-plus" class="button try-button" type="button">トライ +1</button>
            </div>

            <label class="field">
              <span class="label">メモ（20文字以内）</span>
              <input id="session-memo" class="input" type="text" maxlength="20" placeholder="任意入力" />
              <div id="session-memo-count" class="small muted" style="text-align: right;">0/20</div>
            </label>

            <div class="grid-2">
              <button id="session-record-sent" class="button" type="button">完登</button>
              <button id="session-record-unsent" class="button secondary" type="button">Next</button>
            </div>

            <div class="stack-sm">
              <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
                <div class="label">現在のResult</div>
                <div class="small muted">直近の記録を表示</div>
              </div>
              <div id="session-result-list" class="result-list"></div>
              <button id="session-end" class="button danger" type="button">Session終了</button>
            </div>
          </div>
        </div>
      </section>

      <section id="screen-edit" class="screen">
        <div class="grid-edit">
          <div class="card">
            <div class="card-header">
              <h2 class="card-title">記録済み課題一覧</h2>
            </div>
            <div id="edit-list" class="edit-list"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <h2 class="card-title">課題編集</h2>
            </div>
            <div class="stack">
              <div id="edit-form" class="stack" style="display: none;">
                <label class="field">
                  <span class="label">グレード</span>
                  <select id="edit-grade" class="select"></select>
                </label>

                <label class="field">
                  <span class="label">壁の傾斜</span>
                  <select id="edit-wall-angle" class="select"></select>
                </label>

                <label class="field">
                  <span class="label">課題タイプ</span>
                  <select id="edit-problem-type" class="select"></select>
                </label>

                <div class="field">
                  <div class="label">トライ回数</div>
                  <div style="display: flex; align-items: center; gap: 8px;">
                    <button id="edit-try-minus" class="button ghost icon-button" type="button">-</button>
                    <div id="edit-try-count" class="count-box" style="min-width: 80px; min-height: 48px; font-size: 20px;">1</div>
                    <button id="edit-try-plus" class="button ghost icon-button" type="button">+</button>
                  </div>
                </div>

                <div class="field">
                  <div class="label">完登 / 未登</div>
                  <div class="grid-2">
                    <button id="edit-status-sent" class="button secondary" type="button">完登</button>
                    <button id="edit-status-unsent" class="button secondary" type="button">未登</button>
                  </div>
                </div>

                <label class="field">
                  <span class="label">メモ（20文字以内）</span>
                  <input id="edit-memo" class="input" type="text" maxlength="20" placeholder="任意入力" />
                  <div id="edit-memo-count" class="small muted" style="text-align: right;">0/20</div>
                </label>

                <div class="grid-2">
                  <button id="edit-save" class="button" type="button">保存</button>
                  <button id="edit-cancel" class="button secondary" type="button">キャンセル</button>
                </div>
              </div>

              <button id="edit-back-session" class="button secondary" type="button">Session画面へ戻る</button>
            </div>
          </div>
        </div>
      </section>

      <section id="screen-result" class="screen">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Result</h2>
          </div>
          <div class="stack">
            <div id="result-list" class="edit-list"></div>
            <div id="result-text" class="text-block"></div>
            <div style="display: flex; flex-wrap: wrap; gap: 12px;">
              <button id="result-copy" class="button" type="button">コピー</button>
              <button id="result-home" class="button secondary" type="button">ホームへ戻る</button>
            </div>
            <div id="result-copy-message" class="muted" style="font-size: 14px;"></div>
          </div>
        </div>
      </section>

      <section id="screen-previous-result" class="screen">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">前回Result</h2>
          </div>
          <div class="stack">
            <div id="previous-result-text" class="text-block"></div>
            <div style="display: flex; flex-wrap: wrap; gap: 12px;">
              <button id="previous-result-copy" class="button" type="button">コピー</button>
              <button id="previous-result-home" class="button secondary" type="button">ホームへ戻る</button>
            </div>
            <div id="previous-result-copy-message" class="muted" style="font-size: 14px;"></div>
          </div>
        </div>
      </section>
    </div>

    <div id="end-dialog" class="dialog-backdrop">
      <div class="dialog">
        <div class="dialog-title">現在の入力内容を破棄してSessionを終了しますか？</div>
        <div class="grid-2">
          <button id="end-dialog-cancel" class="button secondary" type="button">キャンセル</button>
          <button id="end-dialog-confirm" class="button" type="button">終了</button>
        </div>
      </div>
    </div>

    <script>
      var STORAGE_KEY = "climbing:lastSession";
      var STORAGE_KEY_MENUS = "climbing:menus";
      var screens = {
        home: document.getElementById("screen-home"),
        session: document.getElementById("screen-session"),
        edit: document.getElementById("screen-edit"),
        result: document.getElementById("screen-result"),
        previousResult: document.getElementById("screen-previous-result")
      };

      var GRADE_OPTIONS = ["5級", "4級", "3級", "2級", "1級", "初段", "2段"];
      var WALL_ANGLE_OPTIONS = ["スラブ", "垂壁", "薄被り", "強傾斜", "ルーフ", "バルジ"];
      var PROBLEM_TYPE_OPTIONS = ["バランス", "ランジ", "コーディネーション", "ストレニュアス"];

      var state = {
        screen: "home",
        sessionType: "",
        selectedMenuId: null,
        menuProgress: null,
        problems: [],
        editor: createInitialEditorState(""),
        editingIndex: null,
        editState: null,
        lastSessionResults: loadLastSession(),
        menus: loadMenus(),
        menuSetup: {
          name: "",
          problems: []
        }
      };

      function createInitialEditorState(previousGrade) {
        return {
          grade: previousGrade || "",
          tryCount: 1,
          wallAngle: "",
          problemType: "",
          memo: ""
        };
      }

      function getStatusLabel(status) {
        return status === "sent" ? "完登" : "未登";
      }

      function getSessionLabel(sessionType) {
        return sessionType === "volume" ? "容量" : "最大";
      }

      function formatResultText(sessionType, problems) {
        var lines = ["Session: " + getSessionLabel(sessionType), ""];
        for (var i = 0; i < problems.length; i += 1) {
          var problem = problems[i];
          var memoText = problem.memo && problem.memo.trim() ? problem.memo.trim() : "メモなし";
          lines.push((i + 1) + ". " + problem.grade + " / " + problem.wallAngle + " / " + problem.problemType + " / " + problem.tryCount + "トライ / " + getStatusLabel(problem.status) + " / " + memoText);
        }
        return lines.join("\n");
      }

      function validateProblem(params) {
        if (!params.grade) return "グレードを選択してください。";
        if (!params.wallAngle) return "壁の傾斜を選択してください。";
        if (!params.problemType) return "課題タイプを選択してください。";
        if ((params.memo || "").length > 20) return "メモは20文字以内で入力してください。";
        if (params.requireStatus && !params.status) return "完登 / 未登を選択してください。";
        return null;
      }

      function saveLastSession(result) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(result));
      }

      function loadLastSession() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : null;
        } catch (error) {
          return null;
        }
      }

      function saveMenus(menus) {
        localStorage.setItem(STORAGE_KEY_MENUS, JSON.stringify(menus));
      }

      function loadMenus() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY_MENUS);
          return raw ? JSON.parse(raw) : [];
        } catch (error) {
          return [];
        }
      }

      function createMenuId() {
        return Date.now().toString(36) + Math.random().toString(36).substring(2);
      }

      function escapeHtml(value) {
        var div = document.createElement("div");
        div.textContent = String(value);
        return div.innerHTML;
      }

      function renderSelect(selectEl, options, value) {
        selectEl.innerHTML = "";
        var placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "選択してください";
        selectEl.appendChild(placeholder);

        for (var i = 0; i < options.length; i += 1) {
          var option = options[i];
          var el = document.createElement("option");
          el.value = option;
          el.textContent = option;
          if (option === value) {
            el.selected = true;
          }
          selectEl.appendChild(el);
        }
      }

      function showScreen(name) {
        state.screen = name;
        document.getElementById("screen-home").classList.remove("active");
        document.getElementById("screen-session").classList.remove("active");
        document.getElementById("screen-edit").classList.remove("active");
        document.getElementById("screen-result").classList.remove("active");
        document.getElementById("screen-previous-result").classList.remove("active");
        document.getElementById("screen-menu-setup").classList.remove("active");
        document.getElementById("screen-menu-manager").classList.remove("active");

        if (name === "previous-result") {
          document.getElementById("screen-previous-result").classList.add("active");
        } else if (name === "menu-setup") {
          document.getElementById("screen-menu-setup").classList.add("active");
        } else if (name === "menu-manager") {
          document.getElementById("screen-menu-manager").classList.add("active");
        } else {
          document.getElementById("screen-" + name).classList.add("active");
        }

        render();
      }

      function renderHome() {
        var volume = document.getElementById("home-type-volume");
        var max = document.getElementById("home-type-max");
        var start = document.getElementById("home-start");
        var previous = document.getElementById("home-previous");
        var menusContainer = document.getElementById("home-menus");

        volume.className = state.sessionType === "volume" ? "button" : "button secondary";
        max.className = state.sessionType === "max" ? "button" : "button secondary";
        start.disabled = !state.sessionType && !state.selectedMenuId;
        previous.disabled = !state.lastSessionResults;

        menusContainer.innerHTML = "";
        for (var i = 0; i < state.menus.length; i += 1) {
          var menu = state.menus[i];
          var button = document.createElement("button");
          button.type = "button";
          button.className = state.selectedMenuId === menu.id ? "button" : "button secondary";
          button.style.wordBreak = "break-word";
          button.textContent = menu.name;
          button.setAttribute("data-menu-id", menu.id);
          menusContainer.appendChild(button);
        }
      }

      function renderSessionResultList() {
        var list = document.getElementById("session-result-list");
        list.innerHTML = "";

        if (state.problems.length === 0) {
          var empty = document.createElement("div");
          empty.className = "muted";
          empty.style.fontSize = "14px";
          empty.textContent = "まだ記録がありません。";
          list.appendChild(empty);
          return;
        }

        for (var i = state.problems.length - 1; i >= 0; i -= 1) {
          var problem = state.problems[i];
          var index = i + 1;
          var item = document.createElement("div");
          item.className = "result-item";
          item.innerHTML = '<div class="result-row">' +
            '<span class="result-no">' + index + '.</span>' +
            '<span class="result-main">' + escapeHtml(problem.grade) + ' / ' + escapeHtml(problem.wallAngle) + ' / ' + escapeHtml(problem.problemType) + '</span>' +
            '<span>' + problem.tryCount + 'トライ / ' + getStatusLabel(problem.status) + '</span>' +
            '<span class="muted">' + escapeHtml(problem.memo && problem.memo.trim() ? problem.memo : "メモなし") + '</span>' +
          '</div>';
          list.appendChild(item);
        }
      }

      function renderSession() {
        document.getElementById("session-count").textContent = "記録済み " + state.problems.length + "件";
        renderSelect(document.getElementById("session-grade"), GRADE_OPTIONS, state.editor.grade);
        renderSelect(document.getElementById("session-wall-angle"), WALL_ANGLE_OPTIONS, state.editor.wallAngle);
        renderSelect(document.getElementById("session-problem-type"), PROBLEM_TYPE_OPTIONS, state.editor.problemType);
        document.getElementById("session-try-count").textContent = String(state.editor.tryCount);
        document.getElementById("session-memo").value = state.editor.memo;
        document.getElementById("session-memo-count").textContent = state.editor.memo.length + "/20";
        renderSessionResultList();
      }

      function renderEditList() {
        var list = document.getElementById("edit-list");
        list.innerHTML = "";

        if (state.problems.length === 0) {
          var empty = document.createElement("div");
          empty.className = "muted";
          empty.style.fontSize = "14px";
          empty.textContent = "まだ記録がありません。";
          list.appendChild(empty);
          return;
        }

        for (var i = 0; i < state.problems.length; i += 1) {
          var problem = state.problems[i];
          var item = document.createElement("div");
          item.className = "edit-item";
          item.innerHTML = '<div class="edit-item-header">' +
            '<div class="stack-sm" style="gap:4px; font-size:14px;">' +
              '<div style="font-weight:700;">' + (i + 1) + '. ' + escapeHtml(problem.grade) + ' / ' + escapeHtml(problem.wallAngle) + ' / ' + escapeHtml(problem.problemType) + '</div>' +
              '<div>' + problem.tryCount + 'トライ / ' + getStatusLabel(problem.status) + '</div>' +
              '<div class="muted">' + escapeHtml(problem.memo && problem.memo.trim() ? problem.memo : "メモなし") + '</div>' +
            '</div>' +
            '<div class="icon-buttons">' +
              '<button class="button ghost icon-button" type="button" data-edit-index="' + i + '">編集</button>' +
              '<button class="button ghost icon-button" type="button" data-delete-index="' + i + '">削除</button>' +
            '</div>' +
          '</div>';
          list.appendChild(item);
        }
      }

      function renderEditForm() {
        var form = document.getElementById("edit-form");
        var grade = document.getElementById("edit-grade");
        var wallAngle = document.getElementById("edit-wall-angle");
        var type = document.getElementById("edit-problem-type");
        var tryCount = document.getElementById("edit-try-count");
        var memo = document.getElementById("edit-memo");
        var memoCount = document.getElementById("edit-memo-count");
        var sentBtn = document.getElementById("edit-status-sent");
        var unsentBtn = document.getElementById("edit-status-unsent");

        if (!state.editState) {
          form.style.display = "none";
          return;
        }

        form.style.display = "grid";
        renderSelect(grade, GRADE_OPTIONS, state.editState.grade);
        renderSelect(wallAngle, WALL_ANGLE_OPTIONS, state.editState.wallAngle);
        renderSelect(type, PROBLEM_TYPE_OPTIONS, state.editState.problemType);
        tryCount.textContent = String(state.editState.tryCount);
        memo.value = state.editState.memo;
        memoCount.textContent = state.editState.memo.length + "/20";
        sentBtn.className = state.editState.status === "sent" ? "button" : "button secondary";
        unsentBtn.className = state.editState.status === "unsent" ? "button" : "button secondary";
      }

      function renderResultList(containerId, problems) {
        var list = document.getElementById(containerId);
        list.innerHTML = "";
        for (var i = 0; i < problems.length; i += 1) {
          var problem = problems[i];
          var item = document.createElement("div");
          item.className = "edit-item";
          item.innerHTML = '<div class="stack-sm" style="gap:4px; font-size:14px;">' +
            '<div style="font-weight:700;">' + (i + 1) + '. ' + escapeHtml(problem.grade) + ' / ' + escapeHtml(problem.wallAngle) + ' / ' + escapeHtml(problem.problemType) + '</div>' +
            '<div>' + problem.tryCount + 'トライ / ' + getStatusLabel(problem.status) + '</div>' +
            '<div class="muted">' + escapeHtml(problem.memo && problem.memo.trim() ? problem.memo : "メモなし") + '</div>' +
          '</div>';
          list.appendChild(item);
        }
      }

      function renderResult() {
        renderResultList("result-list", state.problems);
        document.getElementById("result-text").textContent = state.sessionType ? formatResultText(state.sessionType, state.problems) : "";
      }

      function renderPreviousResult() {
        var text = document.getElementById("previous-result-text");
        if (!state.lastSessionResults) {
          text.textContent = "前回Resultはありません。";
          return;
        }
        text.textContent = formatResultText(state.lastSessionResults.sessionType, state.lastSessionResults.problems);
      }

      function render() {
        renderHome();
        if (state.screen !== "menu-setup" && state.screen !== "menu-manager") {
          renderSession();
          renderEditList();
          renderEditForm();
          renderResult();
          renderPreviousResult();
        } else if (state.screen === "menu-setup") {
          renderMenuSetup();
        } else if (state.screen === "menu-manager") {
          renderMenuManager();
        }
      }

      function copyText(text, messageElementId) {
        var target = document.getElementById(messageElementId);
        navigator.clipboard.writeText(text).then(function () {
          target.textContent = "コピーしました";
          window.setTimeout(function () {
            target.textContent = "";
          }, 2000);
        }).catch(function () {
          target.textContent = "コピーに失敗しました";
          window.setTimeout(function () {
            target.textContent = "";
          }, 2000);
        });
      }

      function renderMenuSetup() {
        document.getElementById("menu-setup-name").value = state.menuSetup.name;
        var problemsList = document.getElementById("menu-setup-problems");
        problemsList.innerHTML = "";

        if (state.menuSetup.problems.length === 0) {
          var empty = document.createElement("div");
          empty.className = "muted";
          empty.style.fontSize = "14px";
          empty.textContent = "課題を追加してください。";
          problemsList.appendChild(empty);
          return;
        }

        for (var i = 0; i < state.menuSetup.problems.length; i += 1) {
          var problem = state.menuSetup.problems[i];
          var item = document.createElement("div");
          item.className = "menu-item";
          
          var select = document.createElement("select");
          select.className = "select";
          select.style.flex = "1";
          select.setAttribute("data-problem-index", i);
          
          var placeholder = document.createElement("option");
          placeholder.value = "";
          placeholder.textContent = "選択してください";
          select.appendChild(placeholder);
          
          for (var j = 0; j < GRADE_OPTIONS.length; j += 1) {
            var option = document.createElement("option");
            option.value = GRADE_OPTIONS[j];
            option.textContent = GRADE_OPTIONS[j];
            if (GRADE_OPTIONS[j] === problem.grade) {
              option.selected = true;
            }
            select.appendChild(option);
          }
          
          select.addEventListener("change", function (e) {
            var idx = Number(e.target.getAttribute("data-problem-index"));
            state.menuSetup.problems[idx].grade = e.target.value;
          });
          
          item.appendChild(select);
          
          var numberSpan = document.createElement("span");
          numberSpan.style.minWidth = "24px";
          numberSpan.textContent = (i + 1) + ".";
          
          var infoDiv = document.createElement("div");
          infoDiv.className = "menu-item-info";
          infoDiv.innerHTML = "<div class=\"menu-item-grade\">" + (i + 1) + ". " + escapeHtml(problem.grade || "未選択") + "</div>";
          
          var deleteBtn = document.createElement("button");
          deleteBtn.className = "button ghost small-button";
          deleteBtn.type = "button";
          deleteBtn.textContent = "削除";
          deleteBtn.setAttribute("data-problem-index", i);
          (function(idx) {
            deleteBtn.addEventListener("click", function () {
              state.menuSetup.problems = state.menuSetup.problems.filter(function (_, i) {
                return i !== idx;
              });
              renderMenuSetup();
            });
          })(i);
          
          item.appendChild(infoDiv);
          item.appendChild(deleteBtn);
          problemsList.appendChild(item);
        }
      }

      function renderMenuManager() {
        var list = document.getElementById("menu-manager-list");
        list.innerHTML = "";

        if (state.menus.length === 0) {
          var empty = document.createElement("div");
          empty.className = "muted";
          empty.style.fontSize = "14px";
          empty.textContent = "メニューが作成されていません。";
          list.appendChild(empty);
          return;
        }

        for (var i = 0; i < state.menus.length; i += 1) {
          var menu = state.menus[i];
          var item = document.createElement("div");
          item.className = "edit-item";
          item.innerHTML = '<div class="edit-item-header">' +
            '<div class="stack-sm" style="gap:4px; font-size:14px;">' +
              '<div style="font-weight:700;">' + escapeHtml(menu.name) + '</div>' +
              '<div class="muted">課題数: ' + menu.problems.length + '</div>' +
            '</div>' +
            '<div class="icon-buttons">' +
              '<button class="button ghost icon-button" type="button" data-delete-menu-id="' + escapeHtml(menu.id) + '">削除</button>' +
            '</div>' +
          '</div>';
          list.appendChild(item);
        }
      }

      function recordProblem(status) {
        var error = validateProblem({
          grade: state.editor.grade,
          wallAngle: state.editor.wallAngle,
          problemType: state.editor.problemType,
          memo: state.editor.memo
        });
        if (error) {
          window.alert(error);
          return;
        }

        state.problems.push({
          grade: state.editor.grade,
          wallAngle: state.editor.wallAngle,
          tryCount: state.editor.tryCount,
          problemType: state.editor.problemType,
          memo: state.editor.memo,
          status: status
        });

        var nextProblem = null;
        if (state.selectedMenuId && state.menuProgress !== null && state.menuProgress.index < state.menuProgress.items.length - 1) {
          state.menuProgress.index += 1;
          nextProblem = state.menuProgress.items[state.menuProgress.index];
          state.editor = {
            grade: nextProblem.grade,
            tryCount: 1,
            wallAngle: "",
            problemType: "",
            memo: ""
          };
          render();
        } else if (state.selectedMenuId && state.menuProgress !== null && state.menuProgress.index === state.menuProgress.items.length - 1) {
          if (window.confirm("メニューが完了しました。Sessionを終了しますか？")) {
            var result = {
              sessionType: state.sessionType || "",
              menuId: state.selectedMenuId || null,
              endedAt: new Date().toISOString(),
              problems: state.problems.slice()
            };
            saveLastSession(result);
            state.lastSessionResults = result;
            state.selectedMenuId = null;
            state.menuProgress = null;
            showScreen("result");
          } else {
            // メニューを脱出して通常のSessionに戻す
            state.selectedMenuId = null;
            state.menuProgress = null;
            state.editor = createInitialEditorState("");
            render();
          }
        } else {
          state.editor = createInitialEditorState(state.editor.grade);
          render();
        }
      }

      function bindEvents() {
        document.getElementById("home-type-volume").addEventListener("click", function () {
          state.sessionType = "volume";
          state.selectedMenuId = null;
          state.menuProgress = null;
          renderHome();
        });

        document.getElementById("home-type-max").addEventListener("click", function () {
          state.sessionType = "max";
          state.selectedMenuId = null;
          state.menuProgress = null;
          renderHome();
        });

        document.getElementById("home-menu-add").addEventListener("click", function () {
          showScreen("menu-manager");
        });

        document.getElementById("home-menus").addEventListener("click", function (e) {
          if (e.target.tagName === "BUTTON" && e.target.hasAttribute("data-menu-id")) {
            var menuId = e.target.getAttribute("data-menu-id");
            if (state.selectedMenuId === menuId) {
              state.selectedMenuId = null;
              state.menuProgress = null;
            } else {
              state.selectedMenuId = menuId;
              state.sessionType = "";
            }
            renderHome();
          }
        });

        document.getElementById("home-start").addEventListener("click", function () {
          if (!state.sessionType && !state.selectedMenuId) return;
          state.problems = [];
          state.editingIndex = null;
          state.editState = null;

          if (state.selectedMenuId) {
            var selectedMenu = null;
            for (var i = 0; i < state.menus.length; i += 1) {
              if (state.menus[i].id === state.selectedMenuId) {
                selectedMenu = state.menus[i];
                break;
              }
            }
            if (selectedMenu) {
              state.menuProgress = {
                index: 0,
                items: selectedMenu.problems
              };
              state.editor = {
                grade: selectedMenu.problems[0].grade,
                tryCount: 1,
                wallAngle: "",
                problemType: "",
                memo: ""
              };
            }
          } else {
            state.editor = createInitialEditorState("");
          }
          showScreen("session");
        });

        document.getElementById("home-previous").addEventListener("click", function () {
          showScreen("previous-result");
        });

        document.getElementById("session-edit-open").addEventListener("click", function () {
          showScreen("edit");
        });

        document.getElementById("session-grade").addEventListener("change", function (e) {
          state.editor.grade = e.target.value;
        });

        document.getElementById("session-wall-angle").addEventListener("change", function (e) {
          state.editor.wallAngle = e.target.value;
        });

        document.getElementById("session-problem-type").addEventListener("change", function (e) {
          state.editor.problemType = e.target.value;
        });

        document.getElementById("session-memo").addEventListener("input", function (e) {
          state.editor.memo = e.target.value;
          document.getElementById("session-memo-count").textContent = state.editor.memo.length + "/20";
        });

        document.getElementById("session-try-plus").addEventListener("click", function () {
          state.editor.tryCount += 1;
          renderSession();
        });

        document.getElementById("session-record-sent").addEventListener("click", function () {
          recordProblem("sent");
        });

        document.getElementById("session-record-unsent").addEventListener("click", function () {
          recordProblem("unsent");
        });

        document.getElementById("session-end").addEventListener("click", function () {
          if (state.selectedMenuId && state.menuProgress !== null && state.menuProgress.index < state.menuProgress.items.length) {
            if (window.confirm("メニューを完了したくありませんか。現在の記録を保存して終了します。")) {
              var result = {
                sessionType: state.sessionType || "",
                menuId: state.selectedMenuId || null,
                endedAt: new Date().toISOString(),
                problems: state.problems.slice()
              };
              saveLastSession(result);
              state.lastSessionResults = result;
              state.selectedMenuId = null;
              state.menuProgress = null;
              showScreen("result");
            }
          } else {
            if (window.confirm("記録を保存して終了しますか？")) {
              var result = {
                sessionType: state.sessionType || "",
                menuId: state.selectedMenuId || null,
                endedAt: new Date().toISOString(),
                problems: state.problems.slice()
              };
              saveLastSession(result);
              state.lastSessionResults = result;
              state.selectedMenuId = null;
              state.menuProgress = null;
              showScreen("result");
            }
          }
        });

        document.getElementById("end-dialog-cancel").addEventListener("click", function () {
          document.getElementById("end-dialog").classList.remove("open");
        });

        document.getElementById("end-dialog-confirm").addEventListener("click", function () {
          // 不使用（session-endハンドラで直接処理）
        });

        document.getElementById("edit-list").addEventListener("click", function (e) {
          var target = e.target;
          var editIndex = target.getAttribute("data-edit-index");
          var deleteIndex = target.getAttribute("data-delete-index");

          if (editIndex !== null) {
            var editNumber = Number(editIndex);
            state.editingIndex = editNumber;
            state.editState = {
              grade: state.problems[editNumber].grade,
              wallAngle: state.problems[editNumber].wallAngle,
              tryCount: state.problems[editNumber].tryCount,
              problemType: state.problems[editNumber].problemType,
              memo: state.problems[editNumber].memo,
              status: state.problems[editNumber].status
            };
            renderEditForm();
            return;
          }

          if (deleteIndex !== null) {
            var deleteNumber = Number(deleteIndex);
            state.problems = state.problems.filter(function (_, i) {
              return i !== deleteNumber;
            });
            if (state.editingIndex === deleteNumber) {
              state.editingIndex = null;
              state.editState = null;
            } else if (state.editingIndex !== null && state.editingIndex > deleteNumber) {
              state.editingIndex -= 1;
            }
            render();
          }
        });

        document.getElementById("edit-grade").addEventListener("change", function (e) {
          if (!state.editState) return;
          state.editState.grade = e.target.value;
        });

        document.getElementById("edit-wall-angle").addEventListener("change", function (e) {
          if (!state.editState) return;
          state.editState.wallAngle = e.target.value;
        });

        document.getElementById("edit-problem-type").addEventListener("change", function (e) {
          if (!state.editState) return;
          state.editState.problemType = e.target.value;
        });

        document.getElementById("edit-memo").addEventListener("input", function (e) {
          if (!state.editState) return;
          state.editState.memo = e.target.value;
          document.getElementById("edit-memo-count").textContent = state.editState.memo.length + "/20";
        });

        document.getElementById("edit-try-minus").addEventListener("click", function () {
          if (!state.editState) return;
          state.editState.tryCount = Math.max(1, state.editState.tryCount - 1);
          renderEditForm();
        });

        document.getElementById("edit-try-plus").addEventListener("click", function () {
          if (!state.editState) return;
          state.editState.tryCount += 1;
          renderEditForm();
        });

        document.getElementById("edit-status-sent").addEventListener("click", function () {
          if (!state.editState) return;
          state.editState.status = "sent";
          renderEditForm();
        });

        document.getElementById("edit-status-unsent").addEventListener("click", function () {
          if (!state.editState) return;
          state.editState.status = "unsent";
          renderEditForm();
        });

        document.getElementById("edit-save").addEventListener("click", function () {
          if (state.editingIndex === null || !state.editState) return;
          var error = validateProblem({
            grade: state.editState.grade,
            wallAngle: state.editState.wallAngle,
            problemType: state.editState.problemType,
            memo: state.editState.memo,
            status: state.editState.status,
            requireStatus: true
          });
          if (error) {
            window.alert(error);
            return;
          }
          state.problems[state.editingIndex] = {
            grade: state.editState.grade,
            wallAngle: state.editState.wallAngle,
            tryCount: state.editState.tryCount,
            problemType: state.editState.problemType,
            memo: state.editState.memo,
            status: state.editState.status
          };
          state.editingIndex = null;
          state.editState = null;
          render();
        });

        document.getElementById("edit-cancel").addEventListener("click", function () {
          state.editingIndex = null;
          state.editState = null;
          renderEditForm();
        });

        document.getElementById("edit-back-session").addEventListener("click", function () {
          showScreen("session");
        });

        document.getElementById("result-copy").addEventListener("click", function () {
          if (!state.sessionType) return;
          copyText(formatResultText(state.sessionType, state.problems), "result-copy-message");
        });

        document.getElementById("result-home").addEventListener("click", function () {
          showScreen("home");
        });

        document.getElementById("previous-result-copy").addEventListener("click", function () {
          if (!state.lastSessionResults) return;
          copyText(formatResultText(state.lastSessionResults.sessionType, state.lastSessionResults.problems), "previous-result-copy-message");
        });

        document.getElementById("previous-result-home").addEventListener("click", function () {
          showScreen("home");
        });

        document.getElementById("end-dialog").addEventListener("click", function (e) {
          if (e.target.id === "end-dialog") {
            document.getElementById("end-dialog").classList.remove("open");
          }
        });

        document.getElementById("menu-setup-name").addEventListener("input", function (e) {
          state.menuSetup.name = e.target.value;
        });

        document.getElementById("menu-setup-add-problem").addEventListener("click", function () {
          state.menuSetup.problems.push({
            grade: ""
          });
          renderMenuSetup();
        });

        document.getElementById("menu-setup-save").addEventListener("click", function () {
          if (!state.menuSetup.name.trim()) {
            window.alert("メニュー名を入力してください。");
            return;
          }
          if (state.menuSetup.problems.length === 0) {
            window.alert("課題を追加してください。");
            return;
          }
          for (var i = 0; i < state.menuSetup.problems.length; i += 1) {
            if (!state.menuSetup.problems[i].grade) {
              window.alert((i + 1) + "番目の課題でグレードを選択してください。");
              return;
            }
          }
          var newMenu = {
            id: createMenuId(),
            name: state.menuSetup.name,
            problems: state.menuSetup.problems.slice()
          };
          state.menus.push(newMenu);
          saveMenus(state.menus);
          showScreen("menu-manager");
        });

        document.getElementById("menu-setup-cancel").addEventListener("click", function () {
          showScreen("menu-manager");
        });

        document.getElementById("menu-manager-create").addEventListener("click", function () {
          state.menuSetup.name = "";
          state.menuSetup.problems = [];
          showScreen("menu-setup");
        });

        document.getElementById("menu-manager-close").addEventListener("click", function () {
          showScreen("home");
        });

        document.getElementById("menu-manager-list").addEventListener("click", function (e) {
          var deleteMenuId = e.target.getAttribute("data-delete-menu-id");
          if (deleteMenuId) {
            if (window.confirm("このメニューを削除しますか？")) {
              state.menus = state.menus.filter(function (menu) {
                return menu.id !== deleteMenuId;
              });
              saveMenus(state.menus);
              renderMenuManager();
            }
          }
        });
      }

      bindEvents();
      render();

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./service-worker.js").catch(function () {
          });
        });
      }
    </script>
  </body>
</html>
